name: Download new paper PDFs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/download-new-paper-pdfs.yml
      - scripts/download_new_papers.sh

permissions:
  contents: write

jobs:
  download-pdfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download PDFs
        run: bash scripts/download_new_papers.sh

      - name: Commit PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '最相关/REFLECT-Silent-Failure-Attribution/paper.pdf'
          git add '最相关/False-Success-Silent-Failure/paper.pdf'
          git add '最相关/AgentRx-Diagnosing-Agent-Failures/paper.pdf'
          git add '高度相关/TrajAD-Trajectory-Anomaly-Detection/paper.pdf'
          git add '高度相关/AgentPRM-Process-Reward-Models/paper.pdf'
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "chore: download new paper PDFs"
            git push
          fi
