<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">离线评测与归因闭环</title>
  <desc id="desc">离线评测发现问题，归因系统定位，专家确认，真实案例沉淀，定向优化，再由 Golden 和 Hard Set 验证并人工接受。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <g fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)">
    <path d="M190 70 H235"/>
    <path d="M405 70 H450"/>
    <path d="M620 70 H665"/>
    <path d="M750 110 V175"/>
    <path d="M665 215 H620"/>
    <path d="M450 215 H405"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#1f2937" text-anchor="middle">
    <rect x="20" y="30" width="170" height="80" rx="12" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
    <text x="105" y="65"><tspan x="105">离线评测规则</tspan><tspan x="105" dy="23">发现问题</tspan></text>
    <rect x="235" y="30" width="170" height="80" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
    <text x="320" y="65"><tspan x="320">归因系统定位步骤</tspan><tspan x="320" dy="23">和候选根因</tspan></text>
    <rect x="450" y="30" width="170" height="80" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
    <text x="535" y="65"><tspan x="535">领域专家现场</tspan><tspan x="535" dy="23">确认或纠正</tspan></text>
    <path d="M665 30 H835 V103 Q820 95 805 105 Q790 115 775 105 Q760 95 745 105 Q730 115 715 105 Q700 95 685 105 Q675 111 665 107 Z" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
    <text x="750" y="65"><tspan x="750">真实案例沉淀为</tspan><tspan x="750" dy="23">可复用数据集</tspan></text>
    <rect x="665" y="175" width="170" height="80" rx="12" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
    <text x="750" y="210"><tspan x="750">定向优化 Skill</tspan><tspan x="750" dy="23">知识库和 Workflow</tspan></text>
    <rect x="450" y="175" width="170" height="80" rx="12" fill="#f5f5f5" stroke="#666666" stroke-width="2"/>
    <text x="535" y="210"><tspan x="535">Golden / Hard Set</tspan><tspan x="535" dy="23">验证变更</tspan></text>
    <rect x="235" y="175" width="170" height="80" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
    <text x="320" y="210"><tspan x="320">人工接受后进入</tspan><tspan x="320" dy="23">下一轮真实运行</tspan></text>
