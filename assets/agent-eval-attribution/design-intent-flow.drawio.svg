<svg xmlns="http://www.w3.org/2000/svg" width="920" height="150" viewBox="0 0 920 150" role="img" aria-labelledby="title desc">
  <title id="title">设计意图流程</title>
  <desc id="desc">从真实流程问题发现和复盘，到领域专家确认、修改 Agent Workflow，再用离线评测验证改动。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <g fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)">
    <path d="M205 75 H240"/>
    <path d="M430 75 H465"/>
    <path d="M655 75 H690"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#1f2937" text-anchor="middle">
    <rect x="20" y="35" width="185" height="80" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
    <text x="112.5" y="70"><tspan x="112.5">真实流程中的</tspan><tspan x="112.5" dy="24">问题发现和复盘</tspan></text>
    <rect x="245" y="35" width="185" height="80" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
    <text x="337.5" y="70"><tspan x="337.5">领域专家</tspan><tspan x="337.5" dy="24">低成本确认</tspan></text>
    <rect x="470" y="35" width="185" height="80" rx="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
    <text x="562.5" y="70"><tspan x="562.5">修改 Agent</tspan><tspan x="562.5" dy="24">Workflow</tspan></text>
    <rect x="695" y="35" width="205" height="80" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
    <text x="797.5" y="70"><tspan x="797.5">离线评测验证</tspan><tspan x="797.5" dy="24">Workflow 改动</tspan></text>
  </g>
</svg>
