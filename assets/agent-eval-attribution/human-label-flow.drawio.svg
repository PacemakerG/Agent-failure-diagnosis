<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">人机标注流程</title>
  <desc id="desc">从业务症状到违规约束、关键执行事件、证据、人工确认根因、应拦截问题的 Gate 和最终处理结果。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <g fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)">
    <path d="M190 70 H235"/>
    <path d="M405 70 H450"/>
    <path d="M620 70 H665"/>
    <path d="M750 110 V175"/>
    <path d="M665 215 H625"/>
    <path d="M455 215 H410"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#1f2937" text-anchor="middle">
    <rect x="20" y="30" width="170" height="80" rx="12" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
    <text x="105" y="76">业务症状</text>
    <rect x="235" y="30" width="170" height="80" rx="12" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
    <text x="320" y="76">违规阶段和约束</text>
    <rect x="450" y="30" width="170" height="80" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
    <text x="535" y="65"><tspan x="535">关键 Skill</tspan><tspan x="535" dy="24">Action / Event</tspan></text>
    <path d="M665 30 H835 V98 Q820 90 805 100 Q790 110 775 100 Q760 90 745 100 Q730 110 715 100 Q700 90 685 100 Q675 106 665 104 Z" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
    <text x="750" y="72">证据引用</text>
    <rect x="665" y="175" width="170" height="80" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
    <text x="750" y="210"><tspan x="750">人工确认的</tspan><tspan x="750" dy="24">候选根因</tspan></text>
    <path d="M540 165 L625 215 L540 265 L455 215 Z" fill="#f5f5f5" stroke="#666666" stroke-width="2"/>
    <text x="540" y="210"><tspan x="540">应拦截问题的</tspan><tspan x="540" dy="22">Gate</tspan></text>
    <rect x="240" y="175" width="170" height="80" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
    <text x="325" y="221">最终处理结果</text>
  </g>
</svg>
