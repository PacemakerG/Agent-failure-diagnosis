<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="190" viewBox="0 0 1000 190" role="img" aria-labelledby="title desc">
  <title id="title">从 Skill 窗口诊断扩展到全流程归因</title>
  <desc id="desc">从最终业务问题出发，构建完整 Session 图，反向追踪跨阶段传播链，定位首次异常、候选根因与漏检 Gate，并由领域专家确认。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/></marker>
  </defs>
  <g fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)">
    <path d="M190 95 H225"/><path d="M385 95 H420"/><path d="M580 95 H615"/><path d="M775 95 H810"/>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#1f2937" text-anchor="middle">
    <rect x="30" y="55" width="160" height="80" rx="12" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
    <text x="110" y="87"><tspan x="110">最终业务问题</tspan><tspan x="110" dy="23">或用户反馈</tspan></text>
    <rect x="225" y="55" width="160" height="80" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
    <text x="305" y="82"><tspan x="305">全 Session</tspan><tspan x="305" dy="22">Action / Event / Artifact 图</tspan></text>
    <rect x="420" y="55" width="160" height="80" rx="12" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
    <text x="500" y="87"><tspan x="500">反向追踪</tspan><tspan x="500" dy="23">跨阶段传播链</tspan></text>
    <path d="M695 45 L775 95 L695 145 L615 95 Z" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
    <text x="695" y="86"><tspan x="695">首次异常、候选根因</tspan><tspan x="695" dy="22">与漏检 Gate</tspan></text>
    <rect x="810" y="55" width="160" height="80" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
    <text x="890" y="82"><tspan x="890">领域专家确认、纠正</tspan><tspan x="890" dy="22">或标记证据不足</tspan></text>
  </g>
</svg>
